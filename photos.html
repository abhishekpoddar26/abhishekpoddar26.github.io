<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos | Abhishek Poddar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #2563eb;
            --accent-color: #38bdf8;
            --text-color: #1e293b;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; line-height: 1.7; color: var(--text-color); background-color: #f1f5f9; padding-bottom: 80px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 30px; }

        nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .nav-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .nav-link { color: #cbd5e1; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; padding: 5px 12px; border-radius: 6px; }
        .nav-link:hover, .nav-link.active { color: white; background: rgba(255,255,255,0.1); }

        header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 60px 0 100px 0; margin-bottom: -60px; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); text-align: center; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; }

        section { background: var(--white); padding: 50px; margin-bottom: 30px; border-radius: 20px; box-shadow: var(--shadow-md); border: 1px solid rgba(226, 232, 240, 0.8); position: relative; }
        h2 { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; font-weight: 700; }
        h2::after { content: ''; flex-grow: 1; height: 1px; background: #e2e8f0; }

        /* Auto-enlarging Carousel (Circular Motion) */
        .carousel-outer { overflow: hidden; padding: 40px 0; }
        .carousel-track { display: flex; gap: 30px; animation: scroll 20s linear infinite; width: calc(300px * 8 + 30px * 8); }
        .carousel-item { flex-shrink: 0; width: 300px; height: 300px; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-md); transition: transform 0.3s, filter 0.3s; cursor: pointer; }
        .carousel-item:hover { transform: scale(1.1); z-index: 10; filter: brightness(1.1); }
        .carousel-item img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 4 - 30px * 4)); }
        }

        /* Lightbox (Enlarge on Click) */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
        .lightbox img { max-width: 90% ; max-height: 90% ; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.3s ease; }
        .lightbox.active { display: flex; }
        .lightbox.active img { transform: scale(1); }

        footer { text-align: center; padding-top: 40px; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav>
    <div class="container nav-container">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Me</a>
        <a href="experience.html" class="nav-link">Experience</a>
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="skills.html" class="nav-link">Skills</a>
        <a href="academics.html" class="nav-link">Academics</a>
        <a href="photos.html" class="nav-link active">Photos</a>
        <a href="contact.html" class="nav-link">Contact Me</a>
    </div>
</nav>

<header>
    <div class="container">
        <h1>Gallery</h1>
        <p style="color: #94a3b8;">Moments & Professional Milestones</p>
    </div>
</header>

<div class="container" style="position: relative; z-index: 10;">
    <section>
        <h2>Interactive Gallery</h2>
        <div class="carousel-outer">
            <div class="carousel-track" id="gallery-track">
                <!-- Repeated set for seamless loop -->
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Abhishek_Poddar_Pic.jpg" alt="Photo 1"></div>
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Pic_Abhishek Poddar.jpg" alt="Photo 2"></div>
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Pic7.jpeg" alt="Photo 3"></div>
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Pic8.jpeg" alt="Photo 4"></div>
                <!-- Loop repeats -->
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Abhishek_Poddar_Pic.jpg" alt="Photo 1"></div>
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Pic_Abhishek Poddar.jpg" alt="Photo 2"></div>
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Pic7.jpeg" alt="Photo 3"></div>
                <div class="carousel-item" onclick="openLightbox(this)"><img src="Pic8.jpeg" alt="Photo 4"></div>
            </div>
        </div>
    </section>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img src="" id="lightbox-img" alt="Enlarged Photo">
</div>

<footer>
    <p>&copy; 2026 Abhishek Poddar • Built for modern delivery</p>
</footer>

<script>
    function openLightbox(element) {
        const lightbox = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = element.querySelector('img').src;
        lightbox.classList.add('active');
        // Pause carousel animation when viewing
        document.getElementById('gallery-track').style.animationPlayState = 'paused';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.getElementById('gallery-track').style.animationPlayState = 'running';
    }
</script>

</body>
</html>
